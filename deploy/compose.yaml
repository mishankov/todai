name: todai

services:
  postgres:
    image: postgres:17.7-alpine3.23@sha256:bb377b7239d2774ac8cc76f481596ce96c5a6b5e9d141f6d0a0ee371a6e7c0f2
    environment:
      POSTGRES_DB: todai
      POSTGRES_USER: todai_app
      POSTGRES_PASSWORD: ${TODAI_POSTGRES_PASSWORD:?set TODAI_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todai_app -d todai"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  migrate:
    image: ${TODAI_BACKEND_IMAGE:-ghcr.io/mishankov/todai-backend}:${TODAI_VERSION:?set TODAI_VERSION}
    command: ["migrate"]
    environment:
      TODAI_DATABASE_URL: postgres://todai_app:${TODAI_POSTGRES_PASSWORD}@postgres:5432/todai?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: ${TODAI_BACKEND_IMAGE:-ghcr.io/mishankov/todai-backend}:${TODAI_VERSION:?set TODAI_VERSION}
    environment:
      TODAI_DATABASE_URL: postgres://todai_app:${TODAI_POSTGRES_PASSWORD}@postgres:5432/todai?sslmode=disable
      TODAI_AGENT_RUNTIME: ${TODAI_AGENT_RUNTIME:-fake}
      TODAI_PI_PROVIDER: ${TODAI_PI_PROVIDER:-}
      TODAI_PI_MODEL: ${TODAI_PI_MODEL:-}
      TODAI_PI_MODELS: ${TODAI_PI_MODELS:-}
    volumes:
      - pi-agent-data:/var/lib/todai/pi-agent
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    image: ${TODAI_FRONTEND_IMAGE:-ghcr.io/mishankov/todai-frontend}:${TODAI_VERSION:?set TODAI_VERSION}
    ports:
      - "${TODAI_PUBLISHED_HTTP_PORT:-8080}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres-data:
  pi-agent-data:
