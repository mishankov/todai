version: '3'

tasks:
  install:
    cmds:
      - bun install --frozen-lockfile

  browsers:
    desc: Install browsers required by component and end-to-end tests
    cmds:
      - bun x playwright install chromium chromium-headless-shell

  dev:
    desc: Run the SvelteKit development server
    cmds:
      - bun run dev

  lint:
    cmds:
      - bun run lint

  types:
    cmds:
      - bun run check

  test:
    cmds:
      - bun run test:unit --run

  test:e2e:
    cmds:
      - bun run test:e2e

  build:
    cmds:
      - bun run build

  format:
    cmds:
      - bun run format

  check:
    cmds:
      - bun run lint
      - bun run check
      - bun run test:unit --run
      - bun run build
