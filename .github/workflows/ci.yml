name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: todai
          POSTGRES_USER: todai
          POSTGRES_PASSWORD: todai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todai -d todai"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    defaults:
      run:
        working-directory: backend
    env:
      TODAI_DATABASE_URL: postgres://todai:todai@localhost:5432/todai?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Unit tests
        run: go test ./...
      - name: Apply migrations
        run: go run ./cmd/todai migrate
      - name: Bootstrap user
        run: printf '%s\n' 'ci-password' | go run ./cmd/todai bootstrap-user --username ci-admin --password-stdin
      - name: Start backend
        run: |
          go run ./cmd/todai run > /tmp/todai-backend.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/todai-backend.log
          exit 1
      - name: Auth smoke test
        run: |
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' --request POST http://localhost:8080/api/auth/register)" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/api/projects)" = "401"
          curl --silent --fail --cookie-jar /tmp/todai-cookie --header 'Content-Type: application/json' --data '{"login":"ci-admin","password":"ci-password"}' http://localhost:8080/api/auth/login
          curl --silent --fail --cookie /tmp/todai-cookie http://localhost:8080/api/projects
          curl --silent --fail --cookie /tmp/todai-cookie --request POST http://localhost:8080/api/auth/logout

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Reject runtime fallback
        run: |
          mkdir -p "${RUNNER_TEMP}/no-node"
          printf '#!/bin/sh\nexit 97\n' > "${RUNNER_TEMP}/no-node/node"
          chmod +x "${RUNNER_TEMP}/no-node/node"
          echo "${RUNNER_TEMP}/no-node" >> "${GITHUB_PATH}"
      - run: bun install --frozen-lockfile
      - run: bun x --bun playwright install --with-deps chromium chromium-headless-shell
      - run: bun run lint
      - run: bun run check
      - run: bun run test:unit --run
      - run: bun run build
      - run: bun run test:e2e

  pi-runner:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            build: build:linux:x64
            executable: dist/pi-runner-linux-x64
          - runner: ubuntu-24.04-arm
            build: build:linux:arm64
            executable: dist/pi-runner-linux-arm64
    runs-on: ${{ matrix.runner }}
    env:
      TODAI_PI_SMOKE_AUTH_JSON: ${{ secrets.TODAI_PI_SMOKE_AUTH_JSON }}
      TODAI_PI_SMOKE_MODELS_JSON: ${{ secrets.TODAI_PI_SMOKE_MODELS_JSON }}
      TODAI_PI_PROVIDER: ${{ vars.TODAI_PI_PROVIDER }}
      TODAI_PI_MODEL: ${{ vars.TODAI_PI_MODEL }}
    defaults:
      run:
        working-directory: pi-runner
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Reject runtime fallback
        run: |
          mkdir -p "${RUNNER_TEMP}/no-node"
          printf '#!/bin/sh\nexit 97\n' > "${RUNNER_TEMP}/no-node/node"
          chmod +x "${RUNNER_TEMP}/no-node/node"
          echo "${RUNNER_TEMP}/no-node" >> "${GITHUB_PATH}"
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run ${{ matrix.build }}
      - name: Standalone protocol smoke test
        env:
          TODAI_RUNNER_TEST_EXECUTABLE: ./${{ matrix.executable }}
        run: bun run test:standalone
      - name: Real Pi standalone smoke test
        if: env.TODAI_PI_SMOKE_AUTH_JSON != ''
        env:
          TODAI_RUNNER_TEST_EXECUTABLE: ./${{ matrix.executable }}
          TODAI_PI_AGENT_DIR: ${{ runner.temp }}/pi-agent
          TODAI_PI_SMOKE: "1"
        run: |
          mkdir -p "${TODAI_PI_AGENT_DIR}"
          printf '%s' "${TODAI_PI_SMOKE_AUTH_JSON}" > "${TODAI_PI_AGENT_DIR}/auth.json"
          if test -n "${TODAI_PI_SMOKE_MODELS_JSON}"; then
            printf '%s' "${TODAI_PI_SMOKE_MODELS_JSON}" > "${TODAI_PI_AGENT_DIR}/models.json"
          fi
          bun run test:integration
