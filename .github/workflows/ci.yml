name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          working-directory: backend

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: todai
          POSTGRES_USER: todai
          POSTGRES_PASSWORD: todai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todai -d todai"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    defaults:
      run:
        working-directory: backend
    env:
      TODAI_DATABASE_URL: postgres://todai:todai@localhost:5432/todai?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Unit tests
        run: go test ./...
      - name: Apply migrations
        run: go run ./cmd/todai migrate
      - name: Bootstrap user
        run: printf '%s\n' 'ci-password' | go run ./cmd/todai bootstrap-user --username ci-admin --password-stdin
      - name: Start backend
        run: |
          go run ./cmd/todai run > /tmp/todai-backend.log 2>&1 &
          for attempt in $(seq 1 30); do
            if curl --silent --fail http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/todai-backend.log
          exit 1
      - name: Auth smoke test
        run: |
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' --request POST http://localhost:8080/api/auth/register)" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://localhost:8080/api/protected/ping)" = "401"
          curl --silent --fail --cookie-jar /tmp/todai-cookie --header 'Content-Type: application/json' --data '{"login":"ci-admin","password":"ci-password"}' http://localhost:8080/api/auth/login
          curl --silent --fail --cookie /tmp/todai-cookie http://localhost:8080/api/protected/ping
          curl --silent --fail --cookie /tmp/todai-cookie --request POST http://localhost:8080/api/auth/logout

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium chromium-headless-shell
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm run test:unit -- --run
      - run: pnpm run build
      - run: pnpm run test:e2e
