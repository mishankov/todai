version: "3"

tasks:
  dev:
    desc: Run the Go backend
    cmds:
      - go run ./cmd/todai run

  migrate:
    desc: Apply all registered PostgreSQL migrations
    cmds:
      - go run ./cmd/todai migrate

  bootstrap-user:
    desc: Create the single MVP user (task backend:bootstrap-user USERNAME=admin)
    requires:
      vars: [USERNAME]
    cmds:
      - go run ./cmd/todai bootstrap-user --username "{{.USERNAME}}"

  test:
    vars:
      INTEGRATION_COVERAGE_DIR: "{{.TASKFILE_DIR}}/.coverage/integration"
    cmds:
      - rm -rf "{{.INTEGRATION_COVERAGE_DIR}}"
      - mkdir -p "{{.INTEGRATION_COVERAGE_DIR}}"
      - TODAI_INTEGRATION_COVERAGE_DIR="{{.INTEGRATION_COVERAGE_DIR}}" go test -race -cover ./...
      - go tool covdata percent -i="{{.INTEGRATION_COVERAGE_DIR}}"

  lint:
    cmds:
      - golangci-lint run

  format:
    cmds:
      - gofmt -w .

  check:
    deps: [test, lint]
