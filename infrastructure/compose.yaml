name: todai

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: todai
      POSTGRES_USER: todai
      POSTGRES_PASSWORD: todai
    ports:
      - '${TODAI_POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U todai -d todai']
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
